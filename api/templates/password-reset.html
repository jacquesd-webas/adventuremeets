<h2 style="margin:0 0 12px 0;font-size:20px;">Reset your password</h2>

<p style="margin:0 0 24px 0;">This link is valid for {{expiresIn}}.</p>
<p style="margin:0 0 24px 0;text-align:center;">
  <a href="{{resetUrl}}" style="display:inline-block;background:{{primaryColor}};color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:6px;">Reset password</a>
